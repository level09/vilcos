{% extends "base.html" %}

{% block content %}
<v-main>
    <v-container>
        <v-row justify="center">
            <v-col cols="12" sm="8" md="6">
                <v-card class="mt-10">
                    <v-card-text class="text-center pa-6">
                        <v-icon
                            color="error"
                            size="64"
                            class="mb-4"
                        >
                            mdi-close-circle
                        </v-icon>
                        
                        <h2 class="text-h4 mb-4">Payment Cancelled</h2>
                        <p class="text-subtitle-1">
                            Your order has been cancelled and no payment was taken.
                        </p>
                    </v-card-text>

                    <v-card-actions class="justify-center pa-4">
                        <v-btn
                            color="primary"
                            variant="elevated"
                            href="/booking"
                        >
                            Try Again
                        </v-btn>
                    </v-card-actions>
                </v-card>
            </v-col>
        </v-row>
    </v-container>
</v-main>
{% endblock %}
