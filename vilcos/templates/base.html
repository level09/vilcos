<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FastAPI Supabase Template{% endblock %}</title>
    <!-- Vuetify CSS -->
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.3/dist/vuetify.min.css" rel="stylesheet">
    <!-- MDI Icons -->
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@5.x/css/materialdesignicons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', path='css/main.css') }}" rel="stylesheet">
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
    <script src="https://js.stripe.com/v3/"></script>
</head>

<body>
    <div id="app" class="justify-center full-height align-center min-vh-100 d-flex">
        <v-app v-cloak class="h-screen">
            <v-layout>


                <v-app-bar color="primary">
                    <template v-slot:prepend>
                        <v-app-bar-nav-icon @click.stop="drawer = !drawer"></v-app-bar-nav-icon>
                    </template>

                    <v-toolbar-title class="ml-0 pl-3">
                        Kimchi Princess
                    </v-toolbar-title>
                </v-app-bar>

                <v-navigation-drawer v-model="drawer" app  width="310" expand-on-hover class="h-screen">
                    <v-list dense class="scrollable-nav d-flex flex-column" height="100%">
                        <v-list-item prepend-icon="mdi-file-document-multiple" title="Menus" href="/menus/"
                            key="bulletins"></v-list-item>

                        <v-list-item prepend-icon="mdi-account-multiple" title="Bookings" href="/booking"
                            key="actors"></v-list-item>

                        <v-list-item prepend-icon="mdi-account-multiple" title="Vouchers" href="/vouchers"
                            key="vouchers"></v-list-item>
                    </v-list>
                </v-navigation-drawer>





                {% block content %}{% endblock %}

                <v-snackbar v-model="snackBar" :timeout="3000">
                    ${ snackMessage }
                </v-snackbar>

            </v-layout>
    </div>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vuetify 3 -->
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.3/dist/vuetify.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Corrected Reconnecting WebSocket URL -->
    <script
        src="https://cdn.jsdelivr.net/npm/reconnecting-websocket@4.4.0/dist/reconnecting-websocket-iife.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    {% block scripts %}
    <script>
        const { createApp } = Vue;
        const { createVuetify } = Vuetify;
        const vuetify = createVuetify();

        const app = createApp({
            data() {
                return {
                    drawer: false,  // Controls navigation drawer
                    snackBar: false,
                    menu: null,
                };
            },
            methods: {
                // Add your methods here
            },
            delimiters: ['${', '}']
        });

        app.use(vuetify).mount('#app');
    </script>
    {% endblock %}
</body>

</html>
