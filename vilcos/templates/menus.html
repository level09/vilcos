{% extends "base.html" %}

{% block title %}
Menus Dashboard
{% endblock %}

{% block content %}
<v-main>
    <v-container fluid>
        <v-card>

            <v-data-table-server :headers="headers" :items="menus" :items-length="totalItems" item-key="name"
                class="elevation-1">
                <template v-slot:top>
                    <v-toolbar flat>
                        <v-toolbar-title>Menus</v-toolbar-title>
                        <v-divider class="mx-4" inset vertical></v-divider>
                        <v-spacer></v-spacer>
                        <v-btn color="primary" variant="elevated" @click="dialog = true">Add Menu</v-btn>
                    </v-toolbar>
                </template>

                <!-- Add action buttons in the actions column -->
                <template v-slot:item.actions="{ item }">
                    <v-icon small @click="editItem(item)">mdi-pencil</v-icon>
                    <v-icon small @click="deleteItem(item)">mdi-delete</v-icon>
                </template>
            </v-data-table-server>

            <!-- Add Item Dialog -->
            <v-dialog v-model="dialog" max-width="500px">
                <v-card class="pa-4">
                    <v-card-title>
                        <span class="headline">Add New Menu Item</span>
                    </v-card-title>
                    <v-card-text>
                        <v-form ref="form">
                            <v-text-field label="Item Number" v-model="newItem.item_number" required></v-text-field>
                            <v-text-field label="Name" v-model="newItem.name" required></v-text-field>
                            <v-text-field label="Name (Korean)" v-model="newItem.name_korean"></v-text-field>
                            <v-textarea label="Description" v-model="newItem.description"></v-textarea>
                            <v-text-field label="Dietary Info" v-model="newItem.dietary_info"></v-text-field>
                            <v-text-field label="Price" v-model="newItem.price" type="number" required></v-text-field>
                            <v-select :items="categories" item-text="name" item-value="id" label="Category"
                                v-model="newItem.category_id" required></v-select>
                        </v-form>
                    </v-card-text>
                    <v-card-actions>
                        <v-spacer></v-spacer>
                        <v-btn color="blue darken-1" text @click="dialog = false">Cancel</v-btn>
                        <v-btn variant="elevated" color="blue darken-1" text @click="saveItem">Save</v-btn>
                    </v-card-actions>
                </v-card>
            </v-dialog>
        </v-card>
    </v-container>
</v-main>
{% endblock %}

{% block scripts %}
<script>
    const { createApp } = Vue;
    const { createVuetify } = Vuetify;
    const vuetify = createVuetify();

    const app = createApp({
        data() {
            return {
                headers: [
                    { title: 'Number', value: 'item_number' },
                    { title: 'Name', value: 'name' },
                    { title: '(Korean)', value: 'name_korean' },
                    { title: 'Description', value: 'description' },
                    { title: 'Dietary Info', value: 'dietary_info' },
                    { title: 'Price', value: 'price' },
                    { title: 'Actions', value: 'actions', sortable: false },
                ],
                menus: [],
                drawer: true,
                totalItems: 1000,
                snackBar: false,
                dialog: false,
                newItem: {
                    item_number: '',
                    name: '',
                    name_korean: '',
                    description: '',
                    dietary_info: '',
                    price: '',
                    category_id: '',
                },
                categories: [],
            };
        },
        async mounted() {
            try {
                const response = await fetch('/api/menu-items');
                const data = await response.json();
                this.menus = data.menu_items;
            } catch (error) {
                console.error('Error fetching menu items:', error);
            }
        },
        methods: {
            addMenu() {
                // Logic to add a new menu
            },
            async fetchCategories() {
                try {
                    const response = await fetch('/api/categories');
                    const data = await response.json();
                    this.categories = data.categories;
                } catch (error) {
                    console.error('Error fetching categories:', error);
                }
            },
            saveItem() {
                // Logic to save a new item
            },
        },
    });

    app.use(vuetify).mount('#app');
</script>
{% endblock %}
