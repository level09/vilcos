{% extends 'layout.html' %}
{% block body_class %}
    home
{% endblock %}
{% block content %}
    <v-app id="app" class="d-flex align-center fill-height text-center">

        <v-card class="ma-auto pa-10" width="550">
            <v-card-title class="text-h4">Welcome To Vilcos <span class="text-caption">v1</span></v-card-title>

            <v-card-text class="mt-4">
                Cuttting edge framework for building web applications rapidly.
            </v-card-text>

            <v-card-actions class="justify-center">
                <v-btn variant="text" color="primary" href="/auth/signin" class="mx-2">Login</v-btn>
                or
                <v-btn variant="elevated" color="primary" href="/auth/signup" class="mx-2">Create an Account</v-btn>
            </v-card-actions>

        </v-card>

    </v-app>
{% endblock %}

{% block js %}
    <script>
        const {createApp} = Vue;
        const {createVuetify} = Vuetify;
        const vuetify = createVuetify();

        const app = createApp({
            data() {
                return {
                    drawer: false,
                    snackBar: false,
                    snackMessage: '',
                    menu: null,
                };
            },
            methods: {
                showSnack(message) {
                    this.snackMessage = message;
                    this.snackBar = true;
                },
            },
            delimiters: ['${', '}']
        });

        app.use(vuetify).mount('#app');
    </script>
{% endblock %}
